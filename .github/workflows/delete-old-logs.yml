name: Delete Old Workflow Runs
on:
  schedule:
    - cron: '0 0 * * 0' 
  workflow_dispatch:

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete old workflow runs
        uses: Matt-A-Bennett/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GH_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 30 
          keep_minimum_runs: 5 
